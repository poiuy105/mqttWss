plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'io.emqx.mqtt'
    compileSdk 36
    
    // KittenTTS 需要 NDK
    ndkVersion "27.0.12077973"

    defaultConfig {
        applicationId "io.emqx.mqtt"
        minSdk 23
        targetSdk 29
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // KittenTTS 需要的 ABI 过滤器（仅 full 版本）
        // standard 版本会被覆盖
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    // 产品风味：编译不同版本的APK
    flavorDimensions "tts"
    productFlavors {
        standard {
            dimension "tts"
            applicationIdSuffix ""
            versionNameSuffix "-standard"
            buildConfigField "boolean", "INCLUDE_KITTENTTS", "false"
        }
        full {
            dimension "tts"
            applicationIdSuffix ".full"
            versionNameSuffix "-full"
            buildConfigField "boolean", "INCLUDE_KITTENTTS", "true"
            
            // KittenTTS 需要的配置
            ndk {
                abiFilters "arm64-v8a", "armeabi-v7a"
            }
            
            // 不压缩 ONNX 和 NPZ 文件
            androidResources {
                noCompress "onnx", "npz"
            }
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    
    // KittenTTS C++ 代码编译配置（仅 full 版本）
    externalNativeBuild {
        cmake {
            path = file("src/full/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.viewpager:viewpager:1.0.0'
    implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.bouncycastle:bcprov-jdk15on:1.70'
    implementation 'org.bouncycastle:bcpkix-jdk15on:1.70'
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'
    
    // KittenTTS 相关依赖（仅 full 版本）
    fullImplementation 'com.microsoft.onnxruntime:onnxruntime-android:1.16.3'
    
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
