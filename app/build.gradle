plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'io.emqx.mqtt'
    compileSdk 36
    
    // NDK版本（chinesetts风味需要）
    ndkVersion "27.0.12077973"

    defaultConfig {
        applicationId "io.emqx.mqtt"
        minSdk 23
        targetSdk 29
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
    
    // 禁用lint检查以允许低targetSdk版本
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
    
    // 启用 BuildConfig 生成（Gradle 8+ 需要）
    buildFeatures {
        buildConfig true
    }
    
    // 产品风味：编译不同版本的APK
    flavorDimensions "tts"
    productFlavors {
        standard {
            dimension "tts"
            applicationIdSuffix ""
            versionNameSuffix "-standard"
            buildConfigField "boolean", "INCLUDE_CHINESE_TTS", "false"
        }
        chinesetts {
            dimension "tts"
            applicationIdSuffix ".chinesetts"
            versionNameSuffix "-chinesetts"
            buildConfigField "boolean", "INCLUDE_CHINESE_TTS", "true"
            
            // 优化：只保留arm64-v8a架构（现代设备都支持）
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        chinesettslite {
            dimension "tts"
            applicationIdSuffix ".chinesettslite"
            versionNameSuffix "-chinesetts-lite"
            buildConfigField "boolean", "INCLUDE_CHINESE_TTS", "true"
            
            // 优化：只保留arm64-v8a架构
            ndk {
                abiFilters "arm64-v8a"
            }
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.viewpager:viewpager:1.0.0'
    implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.bouncycastle:bcprov-jdk15on:1.70'
    implementation 'org.bouncycastle:bcpkix-jdk15on:1.70'
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'
    
    // ChineseTtsTflite 相关依赖（完整版 - 含select-tf-ops）
    chinesettsImplementation 'org.tensorflow:tensorflow-lite:2.8.0'
    chinesettsImplementation 'org.tensorflow:tensorflow-lite-select-tf-ops:2.8.0'
    
    // ChineseTtsTflite 精简版依赖（不含select-tf-ops，体积更小）
    chinesettsliteImplementation 'org.tensorflow:tensorflow-lite:2.8.0'
    
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
