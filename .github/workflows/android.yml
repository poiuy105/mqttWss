name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Standard APK (without any TTS)
      run: ./gradlew assembleStandardDebug

    - name: Build Full APK (with KittenTTS)
      run: ./gradlew assembleFullDebug

    - name: Build ChineseTTS APK (with ChineseTtsTflite)
      run: ./gradlew assembleChinesettsDebug

    - name: Upload Standard APK
      uses: actions/upload-artifact@v4
      with:
        name: app-standard-debug
        path: app/build/outputs/apk/standard/debug/app-standard-debug.apk

    - name: Upload Full APK
      uses: actions/upload-artifact@v4
      with:
        name: app-full-debug
        path: app/build/outputs/apk/full/debug/app-full-debug.apk

    - name: Upload ChineseTTS APK
      uses: actions/upload-artifact@v4
      with:
        name: app-chinesetts-debug
        path: app/build/outputs/apk/chinesetts/debug/app-chinesetts-debug.apk
