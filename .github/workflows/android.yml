name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Standard Release APK (without ChineseTtsTflite)
      run: ./gradlew assembleStandardRelease

    - name: Build ChineseTTS Release APK (with select-tf-ops)
      run: ./gradlew assembleChinesettsRelease

    - name: Build ChineseTTS Lite Release APK (without select-tf-ops)
      run: ./gradlew assembleChinesettsliteRelease

    - name: Upload Standard Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-standard-release
        path: app/build/outputs/apk/standard/release/app-standard-release.apk

    - name: Upload ChineseTTS Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-chinesetts-release
        path: app/build/outputs/apk/chinesetts/release/app-chinesetts-release.apk

    - name: Upload ChineseTTS Lite Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-chinesetts-lite-release
        path: app/build/outputs/apk/chinesettslite/release/app-chinesettslite-release.apk
