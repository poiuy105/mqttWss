name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ⭐ 新增：生成固定的debug keystore以支持覆盖安装
    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10950 -dname "CN=Android Debug,O=Android,C=US"

    # ⭐ 新增：设置release签名（如果配置了GitHub Secrets）
    - name: Setup release signing
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        echo "🔐 Setting up release signing..."
        
        # 解码keystore文件
        echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
        
        # 验证文件是否创建成功
        if [ -f app/release-keystore.jks ]; then
          echo "✅ Keystore file created"
          ls -lh app/release-keystore.jks
        else
          echo "❌ Failed to create keystore"
          exit 1
        fi
        
        # 设置环境变量供build.gradle使用
        echo "RELEASE_KEYSTORE_PATH=release-keystore.jks" >> $GITHUB_ENV
        echo "RELEASE_KEYSTORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD" >> $GITHUB_ENV
        echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
        echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
        
        echo "✅ Release signing configured successfully"

    # ⭐ 修改：同时编译debug和release版本
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    # ⭐ 修改：上传debug APK
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    # ⭐ 新增：上传release APK
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
