name: Test Release Signing

on:
  workflow_dispatch:  # 手动触发

jobs:
  test-signing:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10950 -dname "CN=Android Debug,O=Android,C=US"
    
    - name: Setup release signing (test)
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        echo "🔍 Testing Secrets configuration..."
        echo "RELEASE_KEYSTORE_BASE64 length: ${#RELEASE_KEYSTORE_BASE64}"
        echo "RELEASE_KEYSTORE_PASSWORD: ${RELEASE_KEYSTORE_PASSWORD:0:3}***"
        echo "RELEASE_KEY_ALIAS: $RELEASE_KEY_ALIAS"
        echo "RELEASE_KEY_PASSWORD: ${RELEASE_KEY_PASSWORD:0:3}***"
        
        echo ""
        echo "📦 Decoding keystore..."
        echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
        
        if [ -f app/release-keystore.jks ]; then
          echo "✅ Keystore file created successfully"
          ls -lh app/release-keystore.jks
          
          echo ""
          echo "🔐 Verifying keystore..."
          keytool -list -keystore app/release-keystore.jks -storepass "$RELEASE_KEYSTORE_PASSWORD" -alias "$RELEASE_KEY_ALIAS" || echo "❌ Keystore verification failed"
        else
          echo "❌ Failed to create keystore file"
          exit 1
        fi
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Build Release APK (test)
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      env:
        RELEASE_KEYSTORE_PATH: release-keystore.jks
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        echo "RELEASE_KEYSTORE_PATH=$RELEASE_KEYSTORE_PATH" >> $GITHUB_ENV
        echo "RELEASE_KEYSTORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD" >> $GITHUB_ENV
        echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
        echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
        ./gradlew assembleRelease
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: test-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload Release APK
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: test-release-apk
        path: app/build/outputs/apk/release/app-release.apk
