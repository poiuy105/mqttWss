name: Generate Release Keystore

on:
  workflow_dispatch:  # 手动触发

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Generate release keystore
      run: |
        keytool -genkey -v \
          -keystore release-keystore.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias mqtt-release \
          -storepass MqttRelease2024 \
          -keypass MqttRelease2024 \
          -dname "CN=MQTT Client,OU=Development,O=EMQX,L=Shenzhen,S=Guangdong,C=CN"
        
        echo "✅ Keystore generated successfully"
        ls -lh release-keystore.jks
    
    - name: Convert to Base64
      run: |
        BASE64_CONTENT=$(base64 -w 0 release-keystore.jks)
        echo "RELEASE_KEYSTORE_BASE64=$BASE64_CONTENT" >> $GITHUB_ENV
        
        # 输出到日志（仅用于复制，之后会删除这个步骤）
        echo "=========================================="
        echo "📋 COPY THIS TO GITHUB SECRETS:"
        echo "=========================================="
        echo ""
        echo "Secret Name: RELEASE_KEYSTORE_BASE64"
        echo "Secret Value:"
        echo "$BASE64_CONTENT"
        echo ""
        echo "=========================================="
        echo "Other secrets to add manually:"
        echo "RELEASE_KEYSTORE_PASSWORD: MqttRelease2024"
        echo "RELEASE_KEY_ALIAS: mqtt-release"
        echo "RELEASE_KEY_PASSWORD: MqttRelease2024"
        echo "=========================================="
    
    - name: Upload keystore as artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-keystore
        path: release-keystore.jks
        retention-days: 1
